name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
      # XML doc comments on the four documented projects feed the
      # auto-generated .NET API reference under docs/reference/api/.
      - 'dotnet/src/Pal.Application/**'
      - 'dotnet/src/Pal.Engine/**'
      - 'dotnet/src/Pal.Packs/**'
      - 'dotnet/src/Pal.Reporting/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - '.config/dotnet-tools.json'
      - '.github/workflows/docs.yml'
      - 'dotnet/src/Pal.Application/**'
      - 'dotnet/src/Pal.Engine/**'
      - 'dotnet/src/Pal.Packs/**'
      - 'dotnet/src/Pal.Reporting/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages deploys must serialize. We let one in-flight deploy finish rather than
# canceling it, so a fresh push doesn't leave Pages in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          # docfx _gitContribute reads commit history to populate the
          # "last modified" timestamp on each page. Shallow checkouts break it.
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore docfx tool
        run: dotnet tool restore

      # Build the four documented projects so XML doc files exist before
      # DocFX's metadata extractor runs. The full solution build also covers
      # this; building just the leaf projects keeps the workflow fast.
      - name: Build documented projects
        run: |
          dotnet build dotnet/src/Pal.Application/Pal.Application.csproj -c Release
          dotnet build dotnet/src/Pal.Engine/Pal.Engine.csproj -c Release
          dotnet build dotnet/src/Pal.Packs/Pal.Packs.csproj -c Release
          dotnet build dotnet/src/Pal.Reporting/Pal.Reporting.csproj -c Release

      - name: Build docs site
        run: dotnet docfx docs/docfx.json --warningsAsErrors

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_site

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-preview
          path: docs/_site
          retention-days: 7

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
