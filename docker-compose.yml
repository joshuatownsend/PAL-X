services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pal
      POSTGRES_USER: pal
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-paldev}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pal -d pal"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=pal;Username=pal;Password=${POSTGRES_PASSWORD:-paldev}"
      Storage__LocalRoot: /data/storage
      Packs__Directory: /app/packs/thresholds
      PAL_BOOTSTRAP_ADMIN_PASSWORD: "${PAL_BOOTSTRAP_ADMIN_PASSWORD:-}"
    volumes:
      - api_data:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_data:
  api_data:
