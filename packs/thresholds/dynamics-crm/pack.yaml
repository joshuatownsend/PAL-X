recommendations:
  investigate-async-failures:
    priority: high
    text: "Review the Microsoft Dynamics CRM AsyncOperationBase table and the CRM trace logs for the failing operation type, and check the CRM Asynchronous Processing Service health, SQL Server availability, and any plug-in/workflow errors driving the failures."
    rationale: "A non-zero failed-operation count on the CRM Async Service means asynchronous jobs (workflows, bulk operations, server-side sync, maintenance) are not completing -- background processing falls behind and data/email/sync state drifts."
  investigate-sandbox-host:
    priority: high
    text: "Inspect the CRM Sandbox Host (sandbox worker) process for crashes/terminations and high CPU; review custom plug-in/custom-workflow-activity code running in isolation mode for unhandled exceptions, resource exhaustion, or long-running calls."
    rationale: "Sandbox worker crashes, terminations, or sustained high CPU degrade isolated plug-in execution, causing failed or delayed custom business logic."
  investigate-auth-failures:
    priority: high
    text: "Correlate the authentication-failure spike with AD/Claims/ADFS health, the CRM web.config authentication settings, and the Windows Security event log; rule out credential issues, clock skew, or a token-service outage before assuming an attack."
    rationale: "A sustained rate of authentication failures (>30/min) across the deployment blocks users from signing in and can indicate an identity-provider outage, misconfiguration, or brute-force activity."
  investigate-crm-server:
    priority: high
    text: "Examine the CRM Server trace logs and Windows Application event log for the failing web-service requests (organization, metadata, discovery, locator, sandbox client), and check SQL Server, IIS, and downstream dependency health."
    rationale: "Failed CRM web-service requests (organization, metadata, discovery, locator, sandbox-client) translate directly into user-facing errors and SDK/integration failures."

rules:
  - rule_id: crm2013-be-async-service-workflow-operations-failed
    severity: warning
    category: dynamics
    title: "CRM Async Service — Workflow Operations Failed"
    summary: "CRM Async Service \"Workflow Operations Failed\" exceeded 0."
    explanation: "The total number of Workflow operations failed. Legacy PAL flags this counter when it rises above 0 on the CRM Async Service role. Sustained breaches indicate failed Dynamics CRM operations that should be investigated."
    conditions:
      - metric: dynamicscrm.async_service.workflow_operations_failed
        instance: "mscrmasyncservice"
        aggregation: max
        operator: gt
        threshold: 0
        duration_percent: 1
    recommendations:
      - investigate-async-failures
