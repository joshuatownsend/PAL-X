schema_version: "pal.pack/v1"
pack_id: dynamics-crm
pack_name: "Microsoft Dynamics CRM 2013"
version: "1.0.0"
description: "Microsoft Dynamics CRM 2013 back-end and front-end role thresholds ported from PAL v2 (DynamicsCRM2013_BackEnd_Basic / _FrontEnd_Basic). Covers CRM Async Service operation failures (including maintenance jobs and server-side sync), CRM Sandbox Host/Client health, CRM Server failed requests, CRM Authentication failures, Discovery and Locator service failures. Loads alongside windows-core (the always-on base) on Dynamics CRM captures."

# Workload pack: loads only when Dynamics CRM 2013 counters are present.
# Base CPU/memory/disk coverage comes from windows-core (always: true) -- do not redeclare it here.
# Faithful port: every legacy <THRESHOLD> that calls StaticThreshold with a literal -Operator/-Threshold
# and is NOT -IsTrendOnly. The legacy 'is raising' (-IsTrendOnly) criticals and two computed/variable
# thresholds (Workflow Operations Outstanding -> $MaxOutstandingWorkflows; Script Error Reports ->
# $ScriptErrorsWarning) are dropped -- PAL-X has no expression DSL (ADR 0002).
