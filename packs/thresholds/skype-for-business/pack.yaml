schema_version: "pal.pack/v1"
pack_id: skype-for-business
pack_name: "Skype for Business / Lync 2013"
version: "1.0.0"
description: "Microsoft Lync Server 2013 / Skype for Business workload thresholds across the Front End, Edge, and Mediation server roles. Ported from the legacy PAL Lync2013-FrontEnd/Edge/Mediation threshold files. Loads alongside windows-core (the always-on base) when any Lync/SfB role counters are present."

# Workload pack: loads only when Lync 2013 / Skype for Business role counters are present.
# Base CPU/memory/disk coverage comes from windows-core (always: true) - do not redeclare it here.
# Three server roles are combined into one pack; rule_ids are prefixed fe-/edge-/med- per role.
# Every rule is a faithful StaticThreshold port from legacy: operator + threshold come verbatim
# from the legacy <CODE>. The legacy files contain no warning-level or trend-only thresholds -
# all ported thresholds are Critical. The SQL Server counters bundled into the Front End template
# reuse the existing sql.* canonical IDs (collapsing the three named instances per ADR dedupe).
