recommendations:
  investigate-front-end-health:
    priority: high
    text: "Correlate the affected Front End counter with the pool's SQL back end (RTC/RTCLOCAL/LYNCLOCAL), CPU/memory headroom, and the Lync event logs; use the Lync Server Management Shell health cmdlets and Centralized Logging Service to localise the failing component."
    rationale: "Front End counters gate registration, conferencing (MCU), routing, and web (UCWA/mobility) services - a sustained breach degrades sign-in, IM/presence, and meetings for users homed on the pool."
    links:
      - "https://learn.microsoft.com/en-us/skypeforbusiness/manage/health-and-monitoring/health-and-monitoring"
  investigate-edge-health:
    priority: high
    text: "Check the Edge A/V (TURN/MRAS), SIP access, and federation/XMPP proxy paths: verify firewall/NAT port ranges, certificate validity, and that authentication to the relay is succeeding; review dropped-packet and throttling counters together."
    rationale: "Edge counters cover external/remote-user media and federation; sustained authentication failures, dropped packets, or throttling break external call/media setup and federated connectivity."
    links:
      - "https://learn.microsoft.com/en-us/skypeforbusiness/plan-your-deployment/edge-server-deployments/edge-server-deployments"
  investigate-mediation-health:
    priority: high
    text: "Investigate the Mediation Server media path to the PSTN gateway/SBC: confirm media relay (MRAS) candidate allocation, gateway reachability and capacity, and review the per-gateway failed-call counters to isolate the affected trunk."
    rationale: "Mediation counters track PSTN/enterprise-voice call setup and media; missing media-relay candidates, connectivity-check failures, or rising failed-call indices indicate degraded or failing voice routing."
    links:
      - "https://learn.microsoft.com/en-us/skypeforbusiness/plan-your-deployment/enterprise-voice-solution/mediation-server"

rules:
  # === Front End role ===
  - rule_id: fe-usrv-dbstore-queue-latency-msec
    severity: critical
    category: sfb
    title: "Front End: USrv - Queue Latency (msec)"
    summary: "USrv - Queue Latency (msec) was at or above 100 (Front End role)."
    explanation: "Queue latency is the amount of time (in milliseconds) that it takes for a request to leave the Front End Server's queue toward the back-end database. If this value by itself is high, you may have be encountering a network problem between FE->SQL. If this value is high and Sproc Latency is high, it is most commonly a bottom-neck with the SQL backend. Legacy PAL alerts Critical when this counter is at or above 100."
    conditions:
      - metric: sfb.usrv_dbstore.queue_latency_msec
        aggregation: avg
        operator: ge
        threshold: 100
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-usrv-dbstore-sproc-latency-msec
    severity: critical
    category: sfb
    title: "Front End: USrv - Sproc Latency (msec)"
    summary: "USrv - Sproc Latency (msec) was at or above 100 (Front End role)."
    explanation: "Sproc latency is the amount of time (in milliseconds) that it takes for the Microsoft(R) SQL Server(R) data management software database to process the request. This performance value is collected from the time the request leaves the Front End Server queue until that the request returns. If this value by itself is high, it is likely a bottleneck with the SQL backend. Legacy PAL alerts Critical when this counter is at or above 100."
    conditions:
      - metric: sfb.usrv_dbstore.sproc_latency_msec
        aggregation: avg
        operator: ge
        threshold: 100
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-usrv-regdbstore-sproc-latency-msec
    severity: critical
    category: sfb
    title: "Front End: USrv - Sproc Latency (msec)"
    summary: "USrv - Sproc Latency (msec) was at or above 100 (Front End role)."
    explanation: "The average time (in milliseconds) it takes to execute a sproc call. Legacy PAL alerts Critical when this counter is at or above 100."
    conditions:
      - metric: sfb.usrv_regdbstore.sproc_latency_msec
        aggregation: avg
        operator: ge
        threshold: 100
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-usrv-dbstore-throttled-requests-per-sec
    severity: critical
    category: sfb
    title: "Front End: USrv - Throttled requests/sec"
    summary: "USrv - Throttled requests/sec was above 0 (Front End role)."
    explanation: "The number of requests that were rejected/sec with a retry-after since the database queue latency was high. Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.usrv_dbstore.throttled_requests_per_sec
        aggregation: avg
        operator: gt
        threshold: 0
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-peers-sends-timed-out-per-sec
    severity: critical
    category: sfb
    title: "Front End: SIP - Sends Timed-Out/sec"
    summary: "SIP - Sends Timed-Out/sec was above 0 (Front End role)."
    explanation: "The per-second rate of sends dropped because they stayed in outgoing (send) queue for too long. Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.sip_peers.sends_timed_out_per_sec
        instance: "_Total"
        aggregation: avg
        operator: gt
        threshold: 0
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-responses-local-503-responses-per-sec
    severity: critical
    category: sfb
    title: "Front End: SIP - Local 503 Responses/sec"
    summary: "SIP - Local 503 Responses/sec was above 0 (Front End role)."
    explanation: "The per-second rate of 503 responses generated by the server. Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.sip_responses.local_503_responses_per_sec
        aggregation: avg
        operator: gt
        threshold: 0
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-peers-average-outgoing-queue-delay
    severity: critical
    category: sfb
    title: "Front End: SIP - Average Outgoing Queue Delay"
    summary: "SIP - Average Outgoing Queue Delay was above 2 (Front End role)."
    explanation: "The average time (in seconds) the messages delayed in outgoing (send) queues. Legacy PAL alerts Critical when this counter is above 2."
    conditions:
      - metric: sfb.sip_peers.average_outgoing_queue_delay
        instance: "_Total"
        aggregation: avg
        operator: gt
        threshold: 2
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-peers-flow-controlled-connections
    severity: critical
    category: sfb
    title: "Front End: SIP - Flow-controlled Connections"
    summary: "SIP - Flow-controlled Connections was at or above 2 (Front End role)."
    explanation: "The number of connections that are currently being flow-controlled (no socket receives are posted). Legacy PAL alerts Critical when this counter is at or above 2."
    conditions:
      - metric: sfb.sip_peers.flow_controlled_connections
        instance: "_Total"
        aggregation: max
        operator: ge
        threshold: 2
        duration_percent: 1
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-protocol-incoming-requests-dropped-per-sec
    severity: critical
    category: sfb
    title: "Front End: SIP - Incoming Requests Dropped/sec"
    summary: "SIP - Incoming Requests Dropped/sec was at or above 1 (Front End role)."
    explanation: "The per-second rate of incoming requests dropped because they could not be processed (due to bad headers, insufficient routing information, server resource allocation failure). Legacy PAL alerts Critical when this counter is at or above 1."
    conditions:
      - metric: sfb.sip_protocol.incoming_requests_dropped_per_sec
        aggregation: avg
        operator: ge
        threshold: 1
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-protocol-incoming-responses-dropped-per-sec
    severity: critical
    category: sfb
    title: "Front End: SIP - Incoming Responses Dropped/sec"
    summary: "SIP - Incoming Responses Dropped/sec was at or above 1 (Front End role)."
    explanation: "The per-second rate of incoming responses dropped because they could not be processed (due to bad headers, insufficient routing information, server resource allocation failure). Legacy PAL alerts Critical when this counter is at or above 1."
    conditions:
      - metric: sfb.sip_protocol.incoming_responses_dropped_per_sec
        aggregation: avg
        operator: ge
        threshold: 1
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-protocol-average-incoming-message-processing-time
    severity: critical
    category: sfb
    title: "Front End: SIP - Average Incoming Message Processing Time"
    summary: "SIP - Average Incoming Message Processing Time was at or above 1 (Front End role)."
    explanation: "The average time (in seconds) it takes to process an incoming message. Legacy PAL alerts Critical when this counter is at or above 1."
    conditions:
      - metric: sfb.sip_protocol.average_incoming_message_processing_time
        aggregation: avg
        operator: ge
        threshold: 1
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-authentication-authentication-system-errors-per-sec
    severity: critical
    category: sfb
    title: "Front End: SIP - Authentication System Errors/sec"
    summary: "SIP - Authentication System Errors/sec was at or above 1 (Front End role)."
    explanation: "The per-second rate of authentication failures caused by system errors (due to low memory conditions or otherwise). Legacy PAL alerts Critical when this counter is at or above 1."
    conditions:
      - metric: sfb.sip_authentication.authentication_system_errors_per_sec
        aggregation: avg
        operator: ge
        threshold: 1
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-load-management-average-holding-time-for-incoming-messages
    severity: critical
    category: sfb
    title: "Front End: SIP - Average Holding Time For Incoming Messages"
    summary: "SIP - Average Holding Time For Incoming Messages was at or above 1 (Front End role)."
    explanation: "The average time that the server held the incoming messages currently being processed. Legacy PAL alerts Critical when this counter is at or above 1."
    conditions:
      - metric: sfb.sip_load_management.average_holding_time_for_incoming_messages
        aggregation: avg
        operator: ge
        threshold: 1
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-sip-load-management-incoming-messages-timed-out
    severity: critical
    category: sfb
    title: "Front End: SIP - Incoming Messages Timed out"
    summary: "SIP - Incoming Messages Timed out was at or above 2 (Front End role)."
    explanation: "The number of incoming messages currently being held by the server for processing for more than the maximum tracking interval. Legacy PAL alerts Critical when this counter is at or above 2."
    conditions:
      - metric: sfb.sip_load_management.incoming_messages_timed_out
        aggregation: max
        operator: ge
        threshold: 2
        duration_percent: 1
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-routingapps-inter-cluster-routing-number-of-primary-registrar-timeouts
    severity: critical
    category: sfb
    title: "Front End: RoutingApps - Number of primary registrar timeouts"
    summary: "RoutingApps - Number of primary registrar timeouts was above 0 (Front End role)."
    explanation: "Number of requests for which primary registrar timed out Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.routingapps_inter_cluster_routing.number_of_primary_registrar_timeouts
        aggregation: max
        operator: gt
        threshold: 0
        duration_percent: 1
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-routingapps-inter-cluster-routing-number-of-backup-registrar-timeouts
    severity: critical
    category: sfb
    title: "Front End: RoutingApps - Number of backup registrar timeouts"
    summary: "RoutingApps - Number of backup registrar timeouts was above 0 (Front End role)."
    explanation: "Number of requests for which backup registrar timed out Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.routingapps_inter_cluster_routing.number_of_backup_registrar_timeouts
        aggregation: max
