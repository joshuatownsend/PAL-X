    title: "Front End: USrv - Number of data loss events with state change"
    summary: "USrv - Number of data loss events with state change was above 0 (Front End role)."
    explanation: "Total number of data loss events with state change Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sfb.usrv_cluster_manager.number_of_data_loss_events_with_state_change
