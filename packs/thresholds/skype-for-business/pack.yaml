  - rule_id: fe-lyss-storage-service-api-current-percentage-of-space-used-by-storage-service-db
    severity: critical
    category: sfb
    title: "Front End: LYSS - Current percentage of space used by Storage Service DB."
    summary: "LYSS - Current percentage of space used by Storage Service DB. was at or above 80 (Front End role)."
    explanation: "Current percentage of space used by Storage Service DB. Legacy PAL alerts Critical when this counter is at or above 80."
    conditions:
      - metric: sfb.lyss_storage_service_api.current_percentage_of_space_used_by_storage_service_db
        aggregation: avg
        operator: ge
        threshold: 80
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-page-life-expectancy
    severity: critical
    category: sfb
    title: "Front End: Page life expectancy"
    summary: "Page life expectancy was at or below 300 (Front End role)."
    explanation: "Tells, on average, how many seconds SQL Server expects a data page to stay in cache. The target on an OLTP system should be at least 300 (5 min). When under 300, this may indicate poor index design (leading to increased disk I/O and less effective use of memory) or, simply, a potential shortage of memory. A low value, below 3600 seconds (together with high lazy writes/sec and checkpoint pages/sec) indicates memory pressure. Legacy PAL alerts Critical when this counter is at or below 300."
    conditions:
      - metric: sql.page_life_expectancy
        aggregation: avg
        operator: le
        threshold: 300
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-memory-grants-pending
    severity: critical
    category: sfb
    title: "Front End: Memory Grants Pending"
    summary: "Memory Grants Pending was above 0 (Front End role)."
    explanation: "Total number of processes per second waiting for a workspace memory grant. Numbers higher than 0 indicate a lack of memory. Legacy PAL alerts Critical when this counter is above 0."
    conditions:
      - metric: sql.memory_grants_pending
        aggregation: max
        operator: gt
        threshold: 0
        duration_percent: 1
    recommendations:
      - investigate-front-end-health
  - rule_id: fe-batch-requests-per-sec
    severity: critical
    category: sfb
    title: "Front End: Batch Requests/sec"
    summary: "Batch Requests/sec was at or below 2500 (Front End role)."
    explanation: "Number of batch requests received per second, and is a good general indicator for the activity level of the SQL Server. This counter is highly dependent on the hardware and quality of code running on the server. The more powerful the hardware, the higher this number can be, even on poorly coded applications. A value of 1000 batch requests/sec is easily attainable though a typical 100Mbs NIC can only handle about 3000 batch requests/sec.Many other counter thresholds depend upon batch requests/sec while, in some cases, a low (or high) number does not point to poor processing power. You should frequently use this counter in combination with other counters, such as processor utilization or user connections.In version 2000, Transactions/ sec was the counter most often used to measure overall activity, while versions 2005 and later use Batch Requests/sec. Versions 2005 prior to SP2, measure this counter differently and may lead to some misunderstandings. Legacy PAL alerts Critical when this counter is at or below 2500."
    conditions:
      - metric: sql.batch_requests_per_sec
        aggregation: avg
        operator: le
        threshold: 2500
        duration_percent: 10
    recommendations:
      - investigate-front-end-health
